    const PER_PAGE = 10;
    let currentCategory = 'all';
    let currentPage = 1;

    // ── Cart ───────────────────────────────────────────────
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function updateCartCount() {
      const total = cart.reduce((s, i) => s + i.qty, 0);
      const badge = document.getElementById('cartCount');
      if (total > 0) {
        badge.textContent = total;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    }

    function addToCart(productId) {
      const existing = cart.find(i => i.id === productId);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ id: productId, qty: 1 });
      }
      saveCart();
      updateCartCount();
      renderCartSidebar();
      showToast('Added to cart!');
    }

    function removeFromCart(productId) {
      cart = cart.filter(i => i.id !== productId);
      saveCart();
      updateCartCount();
      renderCartSidebar();
    }

    function changeQty(productId, delta) {
      const item = cart.find(i => i.id === productId);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) {
        removeFromCart(productId);
        return;
      }
      saveCart();
      updateCartCount();
      renderCartSidebar();
    }

    function getCartTotal() {
      return cart.reduce((sum, item) => {
        const p = products.find(pr => pr.id === item.id);
        return sum + (p ? p.price * item.qty : 0);
      }, 0);
    }

    function formatPrice(v) {
      return new Intl.NumberFormat('vi-VN').format(v) + ' ₫';
    }

    function renderCartSidebar() {
      const container = document.getElementById('cartItems');
      const countEl = document.getElementById('cartSidebarCount');
      const totalEl = document.getElementById('cartTotal');
      const footer = document.getElementById('cartFooter');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="flex flex-col items-center justify-center h-full text-center">
            <i data-lucide="shopping-cart" class="w-12 h-12 text-gray-600 mb-3"></i>
            <p class="text-gray-400 font-medium">Your cart is empty</p>
            <p class="text-gray-600 text-sm mt-1">Add products to get started</p>
          </div>`;
        footer.classList.add('hidden');
      } else {
        container.innerHTML = cart.map(item => {
          const p = products.find(pr => pr.id === item.id);
          if (!p) return '';
          const badgeClass = `badge badge-${p.badgeColor}`;
          return `
          <div class="flex gap-3 p-3 bg-dark-bg rounded-xl border border-dark-border">
            <div class="product-img w-16 h-16 flex-shrink-0 rounded-lg" style="background:${p.iconBg}">
              <i data-lucide="${p.icon}" class="w-7 h-7" style="color:${p.iconColor}"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-white truncate">${p.name}</p>
              <p class="text-primary font-bold text-sm mt-0.5">${formatPrice(p.price)}</p>
              <div class="flex items-center gap-2 mt-2">
                <button onclick="changeQty(${p.id},-1)" class="w-7 h-7 rounded-lg bg-dark-border hover:bg-dark-muted flex items-center justify-center transition-colors text-gray-300">
                  <i data-lucide="minus" class="w-3 h-3"></i>
                </button>
                <span class="text-sm text-white font-medium w-6 text-center">${item.qty}</span>
                <button onclick="changeQty(${p.id},1)" class="w-7 h-7 rounded-lg bg-dark-border hover:bg-dark-muted flex items-center justify-center transition-colors text-gray-300">
                  <i data-lucide="plus" class="w-3 h-3"></i>
                </button>
                <button onclick="removeFromCart(${p.id})" class="ml-auto text-red-400 hover:text-red-300 transition-colors">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
          </div>`;
        }).join('');
        footer.classList.remove('hidden');
      }

      const totalItems = cart.reduce((s, i) => s + i.qty, 0);
      countEl.textContent = `(${totalItems} item${totalItems !== 1 ? 's' : ''})`;
      totalEl.textContent = formatPrice(getCartTotal());
      lucide.createIcons();
    }

    function openCart() {
      renderCartSidebar();
      document.getElementById('cartSidebar').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeCart() {
      document.getElementById('cartSidebar').classList.add('hidden');
      document.body.style.overflow = '';
    }

    function checkout() {
      if (cart.length === 0) return;
      const total = formatPrice(getCartTotal());
      cart = [];
      saveCart();
      updateCartCount();
      closeCart();
      showToast(`Checkout successful! Total: ${total}`);
    }

    // ── Toast ──────────────────────────────────────────────
    function showToast(msg) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast flex items-center gap-2 px-4 py-3 bg-dark-card border border-dark-border rounded-xl shadow-xl shadow-black/40';
      toast.innerHTML = `
        <i data-lucide="check-circle" class="w-4 h-4" style="color:#10B981"></i>
        <span class="text-sm text-white">${msg}</span>`;
      container.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => toast.remove(), 2200);
    }

    // ── Product Detail Modal ────────────────────────────────
    function openDetail(id) {
      const p = products.find(pr => pr.id === id);
      if (!p) return;
      const content = document.getElementById('detailContent');
      content.innerHTML = `
        <div class="relative">
          <div class="product-img w-full h-48 rounded-t-2xl flex items-center justify-center" style="background:${p.iconBg}">
            <i data-lucide="${p.icon}" class="w-20 h-20" style="color:${p.iconColor}"></i>
            ${p.badge ? `<span class="badge badge-${p.badgeColor} absolute top-3 left-3">${p.badge}</span>` : ''}
          </div>
          <button onclick="closeDetail()" class="absolute top-3 right-3 w-8 h-8 rounded-lg bg-black/40 hover:bg-black/60 flex items-center justify-center transition-colors">
            <i data-lucide="x" class="w-4 h-4 text-white"></i>
          </button>
        </div>
        <div class="p-5 space-y-4">
          <div>
            <h3 class="font-poppins font-bold text-lg text-white">${p.name}</h3>
            <div class="flex items-center gap-3 mt-1.5">
              <div class="flex items-center gap-1">
                ${'<i data-lucide="star" class="w-3.5 h-3.5" style="color:#F59E0B" fill="#F59E0B"></i>'.repeat(Math.floor(p.rating))}
                ${p.rating % 1 ? '<i data-lucide="star-half" class="w-3.5 h-3.5" style="color:#F59E0B" fill="#F59E0B"></i>' : ''}
              </div>
              <span class="text-gray-400 text-xs">${p.rating} (${p.reviews.toLocaleString()} reviews)</span>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="font-poppins font-bold text-2xl text-primary">${formatPrice(p.price)}</span>
            ${p.oldPrice ? `<span class="text-gray-500 text-sm line-through">${formatPrice(p.oldPrice)}</span><span class="badge badge-red text-xs">-${Math.round((1-p.price/p.oldPrice)*100)}%</span>` : ''}
          </div>
          <p class="text-gray-400 text-sm leading-relaxed">${p.desc}</p>
          <div class="grid grid-cols-3 gap-3">
            <div class="text-center p-2 bg-dark-bg rounded-lg">
              <p class="text-gray-500 text-xs">Sold</p>
              <p class="text-white font-bold text-sm">${p.sales.toLocaleString()}</p>
            </div>
            <div class="text-center p-2 bg-dark-bg rounded-lg">
              <p class="text-gray-500 text-xs">In stock</p>
              <p class="text-white font-bold text-sm">${p.stock}</p>
            </div>
            <div class="text-center p-2 bg-dark-bg rounded-lg">
              <p class="text-gray-500 text-xs">Category</p>
              <p class="text-white font-bold text-sm capitalize">${p.category === 'electronics' ? 'Electronics' : p.category === 'fashion' ? 'Fashion' : p.category === 'home' ? 'Home & Living' : p.category === 'beauty' ? 'Beauty' : 'Sports'}</p>
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="addToCart(${p.id}); closeDetail()" class="flex-1 cta-btn justify-center py-3">
              <i data-lucide="shopping-cart" class="w-4 h-4"></i>
              Add to Cart
            </button>
            <button onclick="addToCart(${p.id}); closeDetail()" class="flex items-center justify-center gap-2 bg-dark-bg border border-dark-border hover:border-gray-600 rounded-xl px-4 py-3 text-gray-300 hover:text-white transition-colors">
              <i data-lucide="heart" class="w-4 h-4"></i>
            </button>
          </div>
        </div>`;
      document.getElementById('detailModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      lucide.createIcons();
    }

    function closeDetail() {
      document.getElementById('detailModal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeDetail(); closeCart(); }
    });

    // ── Filter & Sort ──────────────────────────────────────
    function setCategory(cat) {
      currentCategory = cat;
      currentPage = 1;
      document.querySelectorAll('.filter-chip').forEach(el => el.classList.remove('active'));
      document.getElementById('cat-' + cat).classList.add('active');
      applyFilters();
    }

    function applyFilters() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const sort = document.getElementById('sortSelect').value;

      let filtered = products.filter(p => {
        const matchCat = currentCategory === 'all' || p.category === currentCategory;
        const matchSearch = !query || p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query);
        return matchCat && matchSearch;
      });

      switch (sort) {
        case 'price-asc': filtered.sort((a, b) => a.price - b.price); break;
        case 'price-desc': filtered.sort((a, b) => b.price - a.price); break;
        case 'sales-desc': filtered.sort((a, b) => b.sales - a.sales); break;
        case 'name-asc': filtered.sort((a, b) => a.name.localeCompare(b.name)); break;
      }

      document.getElementById('resultCount').textContent =
        `Showing ${filtered.length} of ${products.length} products`;

      renderProducts(filtered);
    }

    // ── Render Products ─────────────────────────────────────
    function renderProducts(list) {
      const grid = document.getElementById('productGrid');
      const start = (currentPage - 1) * PER_PAGE;
      const pageItems = list.slice(start, start + PER_PAGE);

      if (pageItems.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full flex flex-col items-center justify-center py-16 text-center">
            <i data-lucide="package-x" class="w-16 h-16 text-gray-600 mb-4"></i>
            <p class="text-gray-400 font-medium text-lg">No products found</p>
            <p class="text-gray-600 text-sm mt-1">Try changing your search query or filters</p>
          </div>`;
        lucide.createIcons();
        return;
      }

      grid.innerHTML = pageItems.map(p => {
        const badgeClass = p.badge ? `badge badge-${p.badgeColor}` : '';
        const discount = p.oldPrice ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;
        return `
        <div class="product-card card p-3 cursor-pointer group" onclick="openDetail(${p.id})">
          <div class="product-img mb-3 relative" style="background:${p.iconBg}">
            <i data-lucide="${p.icon}" class="w-12 h-12" style="color:${p.iconColor}"></i>
            ${p.badge ? `<span class="${badgeClass} absolute top-2 left-2">${p.badge}</span>` : ''}
            ${discount > 0 ? `<span class="absolute top-2 right-2 badge badge-red">-${discount}%</span>` : ''}
            <div class="absolute inset-0 flex items-center justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <button onclick="event.stopPropagation(); openDetail(${p.id})" class="w-9 h-9 rounded-xl bg-white/20 backdrop-blur-sm hover:bg-white/30 flex items-center justify-center transition-colors">
                <i data-lucide="eye" class="w-4 h-4 text-white"></i>
              </button>
            </div>
          </div>
          <div class="space-y-2">
            <p class="text-gray-200 text-sm font-medium leading-tight line-clamp-2">${p.name}</p>
            <div class="flex items-center gap-1 text-xs text-gray-500">
              ${'<i data-lucide="star" class="w-3 h-3" style="color:#F59E0B" fill="#F59E0B"></i>'.repeat(Math.floor(p.rating))}
              <span>${p.rating}</span>
              <span class="text-gray-600">•</span>
              <span>${p.sales.toLocaleString()} sold</span>
            </div>
            <div class="flex items-center justify-between">
              <span class="font-poppins font-bold text-primary">${formatPrice(p.price)}</span>
              ${p.oldPrice ? `<span class="text-gray-500 text-xs line-through">${formatPrice(p.oldPrice)}</span>` : ''}
            </div>
            <button onclick="event.stopPropagation(); addToCart(${p.id})" class="w-full flex items-center justify-center gap-1.5 py-2 rounded-lg bg-primary/10 hover:bg-primary/20 text-primary text-sm font-medium transition-colors">
              <i data-lucide="shopping-cart" class="w-3.5 h-3.5"></i>
              Add to Cart
            </button>
          </div>
        </div>`;
      }).join('');

      lucide.createIcons();
      renderPagination(list.length);
    }

    // ── Pagination ──────────────────────────────────────────
    function renderPagination(total) {
      const container = document.getElementById('pagination');
      const totalPages = Math.ceil(total / PER_PAGE);

      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }

      let html = '';

      html += `<button onclick="goPage(${currentPage - 1})" class="pagination-btn w-9 h-9 rounded-xl border border-dark-border bg-dark-card flex items-center justify-center text-gray-400 ${currentPage === 1 ? 'opacity-30 cursor-not-allowed' : ''}" ${currentPage === 1 ? 'disabled' : ''}>
        <i data-lucide="chevron-left" class="w-4 h-4"></i>
      </button>`;

      const maxVisible = 5;
      let startPage = Math.max(1, currentPage - 2);
      let endPage = Math.min(totalPages, startPage + maxVisible - 1);
      if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);

      if (startPage > 1) {
        html += `<button onclick="goPage(1)" class="pagination-btn w-9 h-9 rounded-xl border border-dark-border bg-dark-card flex items-center justify-center text-sm font-medium text-gray-300">1</button>`;
        if (startPage > 2) html += `<span class="w-9 h-9 flex items-center justify-center text-gray-600">...</span>`;
      }

      for (let i = startPage; i <= endPage; i++) {
        html += `<button onclick="goPage(${i})" class="pagination-btn w-9 h-9 rounded-xl border border-dark-border bg-dark-card flex items-center justify-center text-sm font-medium ${i === currentPage ? 'active text-white' : 'text-gray-400'}">${i}</button>`;
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span class="w-9 h-9 flex items-center justify-center text-gray-600">...</span>`;
        html += `<button onclick="goPage(${totalPages})" class="pagination-btn w-9 h-9 rounded-xl border border-dark-border bg-dark-card flex items-center justify-center text-sm font-medium text-gray-300">${totalPages}</button>`;
      }

      html += `<button onclick="goPage(${currentPage + 1})" class="pagination-btn w-9 h-9 rounded-xl border border-dark-border bg-dark-card flex items-center justify-center text-gray-400 ${currentPage === totalPages ? 'opacity-30 cursor-not-allowed' : ''}" ${currentPage === totalPages ? 'disabled' : ''}>
        <i data-lucide="chevron-right" class="w-4 h-4"></i>
      </button>`;

      container.innerHTML = html;
      lucide.createIcons();
    }

    function goPage(page) {
      const totalPages = Math.ceil(products.length / PER_PAGE);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      applyFilters();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Refresh ─────────────────────────────────────────────
    function refreshProducts() {
      const icon = document.getElementById('refreshIcon');
      icon.style.transform = 'rotate(360deg)';
      icon.style.transition = 'transform 0.6s';
      setTimeout(() => {
        icon.style.transform = '';
        icon.style.transition = '';
      }, 600);
      applyFilters();
      showToast('Product list refreshed!');
    }

    // ── Logout ─────────────────────────────────────────────
    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('currentUser');
      localStorage.removeItem('cart');
      window.location.href = 'login.html';
    }

    // ── Init ───────────────────────────────────────────────
    updateCartCount();
    applyFilters();
  </script>
</body>
</html>
