<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: {
              bg: '#090A14',
              card: '#111827',
              border: '#1F2937',
              muted: '#374151',
            },
            primary: '#DF6B33',
            primaryHover: '#C45A28',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { background-color: #090A14; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 font-inter text-gray-100">

  <div class="w-full max-w-md">
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-dark-card border border-dark-border mb-4">
        <i data-lucide="scan-face" class="w-7 h-7 text-primary"></i>
      </div>
      <h1 class="font-poppins text-3xl font-extrabold text-white mb-1">Welcome Back</h1>
      <p class="text-gray-400 text-sm">Sign in to your account to continue</p>
    </div>

    <!-- Card -->
    <div class="bg-dark-card border border-dark-border rounded-2xl p-6 sm:p-8 shadow-2xl shadow-black/50">

      <!-- Email Field -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-1.5" for="email">Email Address</label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500">
            <i data-lucide="mail" class="w-4 h-4"></i>
          </span>
          <input
            id="email"
            type="email"
            placeholder="you@example.com"
            class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 pl-10 pr-4 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          />
        </div>
        <p id="emailError" class="text-red-400 text-xs mt-1 hidden">Please enter a valid email address</p>
      </div>

      <!-- Password Field -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-1.5" for="password">Password</label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500">
            <i data-lucide="lock" class="w-4 h-4"></i>
          </span>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 pl-10 pr-10 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          />
          <button type="button" id="togglePassword" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
            <i data-lucide="eye" class="w-4 h-4" id="eyeIcon"></i>
          </button>
        </div>
        <p id="passwordError" class="text-red-400 text-xs mt-1 hidden">Password is required</p>
      </div>

      <!-- Login Error -->
      <div id="loginError" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-xl">
        <div class="flex items-center gap-2 text-red-400 text-sm">
          <i data-lucide="alert-circle" class="w-4 h-4"></i>
          <span id="loginErrorText">Invalid email or password</span>
        </div>
      </div>

      <!-- Remember + Forgot -->
      <div class="flex items-center justify-between mb-6">
        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input type="checkbox" class="w-4 h-4 rounded border-dark-border bg-dark-bg accent-primary cursor-pointer" />
          <span class="text-sm text-gray-400">Remember me</span>
        </label>
        <a href="#" class="text-sm text-primary hover:text-primaryHover transition-colors">Forgot password?</a>
      </div>

      <!-- Sign In Button -->
      <button id="signInBtn" class="w-full bg-primary hover:bg-primaryHover text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-lg shadow-primary/20 disabled:opacity-50 disabled:cursor-not-allowed">
        <i data-lucide="log-in" class="w-4 h-4" id="signInIcon"></i>
        <span id="signInText">Sign In</span>
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-dark-border"></div>
        <span class="text-xs text-gray-500 uppercase tracking-wider">or continue with</span>
        <div class="flex-1 h-px bg-dark-border"></div>
      </div>

      <!-- Social Login -->
      <div class="grid grid-cols-3 gap-3">
        <!-- Google -->
        <button class="flex items-center justify-center gap-2 bg-dark-bg border border-dark-border hover:border-gray-600 rounded-xl py-2.5 px-3 transition-colors group">
          <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span class="text-xs font-medium text-gray-300 group-hover:text-white transition-colors hidden sm:inline">Google</span>
        </button>

        <!-- GitHub -->
        <button class="flex items-center justify-center gap-2 bg-dark-bg border border-dark-border hover:border-gray-600 rounded-xl py-2.5 px-3 transition-colors group">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          <span class="text-xs font-medium text-gray-300 group-hover:text-white transition-colors hidden sm:inline">GitHub</span>
        </button>

        <!-- Facebook -->
        <button class="flex items-center justify-center gap-2 bg-dark-bg border border-dark-border hover:border-gray-600 rounded-xl py-2.5 px-3 transition-colors group">
          <svg class="w-5 h-5 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          <span class="text-xs font-medium text-gray-300 group-hover:text-white transition-colors hidden sm:inline">Facebook</span>
        </button>
      </div>
    </div>

    <!-- Sign up link -->
    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account?
      <a href="register.html" class="text-primary hover:text-primaryHover transition-colors font-medium">Sign up free</a>
    </p>
  </div>

  <script>
    lucide.createIcons();

    // ── Password toggle ──────────────────────────────────────
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
      lucide.createIcons();
    });

    // ── Helpers ─────────────────────────────────────────────
    function showError(elId, msg) {
      const el = document.getElementById(elId);
      if (el) { el.textContent = msg; el.classList.remove('hidden'); }
    }
    function hideError(elId) {
      const el = document.getElementById(elId);
      if (el) el.classList.add('hidden');
    }
    function showLoginError(msg) {
      const err = document.getElementById('loginError');
      const txt = document.getElementById('loginErrorText');
      if (txt) txt.textContent = msg;
      if (err) err.classList.remove('hidden');
    }
    function hideLoginError() {
      const err = document.getElementById('loginError');
      if (err) err.classList.add('hidden');
    }

    // ── Email validation ────────────────────────────────────
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // ── Sign In handler ─────────────────────────────────────
    document.getElementById('signInBtn').addEventListener('click', function() {
      hideLoginError();
      hideError('emailError');
      hideError('passwordError');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      let valid = true;

      if (!email || !isValidEmail(email)) {
        showError('emailError', 'Please enter a valid email address');
        valid = false;
      }
      if (!password) {
        showError('passwordError', 'Password is required');
        valid = false;
      }
      if (!valid) return;

      // Check stored accounts
      const accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
      const account = accounts.find(a => a.email === email && a.password === password);

      if (!account) {
        showLoginError('Invalid email or password. Please try again.');
        return;
      }

      // Success — set session and redirect
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('currentUser', JSON.stringify({ name: account.name, email: account.email }));
      window.location.href = 'home.html';
    });

    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('signInBtn').click();
    });
    document.getElementById('email').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  </script>
</body>
</html>
